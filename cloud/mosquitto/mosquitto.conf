# Fleet cloud broker — single-node dev config.
listener 1883

# DEV ONLY. Anonymous access is fine on a laptop/loopback; for anything exposed you'd add a
# password_file (or TLS + client certs). Flagged here so it's a conscious choice, not an accident.
allow_anonymous true

# Survive a broker restart so retained status + LWT (Chunk 12) aren't lost across `docker compose up`.
persistence true
persistence_location /mosquitto/data/
autosave_interval 60

# Emit broker health under $SYS every 10s — a ready-made scrape target for a broker dashboard later.
sys_interval 10
