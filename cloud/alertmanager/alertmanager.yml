# Prometheus decides WHEN an alert fires; Alertmanager decides who hears it and how loud. Grouping,
# dedup, suppression windows, and inhibition are all config here — the same tree serves Slack or a
# webhook by adding a receiver.

global:
  resolve_timeout: 5m
  # Read at notify time from a gitignored file: if absent, the stack still runs and Slack is skipped
  # while the local sink keeps showing every alert.
  slack_api_url_file: /etc/alertmanager/secrets/slack_api_url

templates:
  - /etc/alertmanager/templates/*.tmpl

# Routing tree: matched top-down, first matching leaf wins. The group_* / repeat_interval windows are
# the dedup + suppression design — each length is justified below.
#   group_by collapses everything sharing (alertname, device) into one notification (dedup).
#   group_wait 30s   — hold a new group briefly so alerts tripping together share one message.
#   group_interval 5m — floor between re-notifies of a changed group; caps a worst-case flap at ≤1/5m.
#                       Sized to our ~1–15m fault windows: 1m nags mid-incident, 30m+ hides real change.
#   repeat_interval 4h — a still-firing group re-pings at most this often (anti-fatigue).
route:
  receiver: fleet-default              # catch-all for anything matching no leaf
  group_by: ["alertname", "device"]    # one notification per (alert, device)
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    # A critical is a wake-someone-up event regardless of owner — page it fast.
    - matchers:
        - severity = "critical"
      receiver: fleet-critical
      group_wait: 10s

    # Warnings route to the owning team's channel, not the pager.
    - matchers:
        - severity = "warning"
        - team = "device-reliability"
      receiver: device-reliability

    - matchers:
        - severity = "warning"
      receiver: fleet-warning

# Every receiver fans out to the local sink, the incident store (send_resolved is load-bearing: it
# closes incidents), and a Slack channel. Only the destination channel changes per severity/owner.
receivers:
  - name: fleet-default
    webhook_configs:
      - url: http://alert-sink:9095/alert
        send_resolved: true
      - url: http://incidents:9096/alert
        send_resolved: true
    slack_configs:
      - channel: "#fleet-alerts"
        send_resolved: true
        title: '{{ template "fleet.slack.title" . }}'
        text: '{{ template "fleet.slack.text" . }}'
        color: '{{ template "fleet.slack.color" . }}'

  - name: fleet-critical
    webhook_configs:
      - url: http://alert-sink:9095/alert
        send_resolved: true
      - url: http://incidents:9096/alert
        send_resolved: true
    slack_configs:
      - channel: "#fleet-critical"
        send_resolved: true
        title: '{{ template "fleet.slack.title" . }}'
        text: '{{ template "fleet.slack.text" . }}'
        color: '{{ template "fleet.slack.color" . }}'

  - name: fleet-warning
    webhook_configs:
      - url: http://alert-sink:9095/alert
        send_resolved: true
      - url: http://incidents:9096/alert
        send_resolved: true
    slack_configs:
      - channel: "#fleet-warnings"
        send_resolved: true
        title: '{{ template "fleet.slack.title" . }}'
        text: '{{ template "fleet.slack.text" . }}'
        color: '{{ template "fleet.slack.color" . }}'

  - name: device-reliability
    webhook_configs:
      - url: http://alert-sink:9095/alert
        send_resolved: true
      - url: http://incidents:9096/alert
        send_resolved: true
    slack_configs:
      - channel: "#fleet-device-reliability"
        send_resolved: true
        title: '{{ template "fleet.slack.title" . }}'
        text: '{{ template "fleet.slack.text" . }}'
        color: '{{ template "fleet.slack.color" . }}'

# Inhibition mutes symptoms along the causality chain: while a source fires, matching targets don't
# notify (they still exist in the UI). Kills the storm where one upstream failure pages every symptom.
inhibit_rules:
  # Bridge down blinds Prometheus to every device, so its freshness/availability/anomaly symptoms
  # aren't per-device-actionable — page the one cause, mute what it explains.
  - source_matchers: [alertname = "FleetIngestPipelineDown"]
    target_matchers: [sli =~ "freshness|availability|anomaly"]

  # Fleet availability breach already means >5% of devices are stale — the per-device warnings are
  # redundant detail; attribution stays on the dashboard and in the incident store.
  - source_matchers: [alertname = "FleetAvailabilityBelowSLO"]
    target_matchers: [alertname = "FleetDeviceStale"]
