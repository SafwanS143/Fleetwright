name: fleet-cloud

services:
  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1883:1883"   # published to the host so the Pi (or fake_telemetry.py) can publish in
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data

  bridge:
    build: ./bridge
    restart: unless-stopped
    environment:
      # Service name, not an IP: docker's embedded DNS resolves `mosquitto` on this network.
      FLEET_BROKER_HOST: mosquitto
      FLEET_BROKER_PORT: "1883"
      FLEET_METRICS_PORT: "8000"
    # No host port: only Prometheus needs to reach /metrics, and it does so over the internal network.
    expose:
      - "8000"
    depends_on:
      - mosquitto   # start-order only; the bridge's loop_forever() reconnects if the broker lags

  anomaly:
    build: ./anomaly
    restart: unless-stopped
    environment:
      FLEET_BROKER_HOST: mosquitto   # same broker; it's a second subscriber, not in the bridge's path
      FLEET_BROKER_PORT: "1883"
      FLEET_METRICS_PORT: "8001"
      # Warm-up + detector knobs; ~300 samples ≈ 30s at 10 Hz before fitting.
      FLEET_ANOMALY_BASELINE: "300"
      FLEET_ZSCORE_SIGMA: "3.5"
      FLEET_IF_CONTAMINATION: "0.01"
    expose:
      - "8001"   # only Prometheus scrapes it, over the internal network
    depends_on:
      - mosquitto

  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro   # SLI/SLO rule files
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"   # expose the Prometheus UI/targets page on the host for debugging
    depends_on:
      - bridge
      - anomaly
      - alertmanager   # start-order only; Prometheus retries the alertmanager connection on its own

  # Routing/dedup/suppression layer: Prometheus fires alerts at it, and it notifies Slack + the sink.
  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./alertmanager/templates:/etc/alertmanager/templates:ro
      # Slack webhook secret (gitignored). Absent on a fresh clone → Slack is skipped, sink still fires.
      - ./alertmanager/secrets:/etc/alertmanager/secrets:ro
      - alertmanager-data:/alertmanager
    ports:
      - "9093:9093"   # Alertmanager UI: see grouped/routed alerts and set silences
    depends_on:
      - alert-sink
      - incidents

  # Always-on local receiver so alerts are visible without any external webhook.
  alert-sink:
    build: ./alertmanager/sink
    restart: unless-stopped
    expose:
      - "9095"

  # SQLite incident store: same Alertmanager webhook as the sink (firing opens, resolved closes),
  # persisted to a volume, exporting fleet_incident_* metrics for Prometheus and Grafana.
  incidents:
    build: ./incidents
    restart: unless-stopped
    environment:
      FLEET_INCIDENT_PORT: "9096"
      FLEET_INCIDENT_DB: /data/incidents.db
      FLEET_REOPEN_WINDOW: "300"     # re-fire within 5m of resolve = same episode
      FLEET_INCIDENT_EXPIRY: "18000" # force-close after 5h silent (catches swallowed resolves)
    volumes:
      - incidents-data:/data
    ports:
      - "9096:9096"   # /incidents (JSON rows + timelines), /metrics

  grafana:
    image: grafana/grafana:11.2.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin   # DEV ONLY — change/secret this before anything is exposed
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

# Named volumes so broker persistence, the Prometheus TSDB, and Grafana's DB survive `down`/`up`.
# (Config and dashboards are bind-mounted from git above; only mutable runtime state lives here.)
volumes:
  mosquitto-data:
  prometheus-data:
  grafana-data:
  alertmanager-data:   # silences + notification state
  incidents-data:      # the SQLite incident history
