# How often Prometheus pulls every target unless a job overrides it. This is THE scrape interval:
# each scrape is one sample per series, so it sets both dashboard resolution and storage cost.
global:
  scrape_interval: 15s
  evaluation_interval: 15s # how often SLI recording rules + SLO alerts are re-evaluated

# SLI recording rules and SLO alert thresholds; glob so new files load on reload.
rule_files:
  - /etc/prometheus/rules/*.yml

# Where firing alerts are sent; all routing/grouping lives in alertmanager/alertmanager.yml.
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]   # docker-network DNS name of the alertmanager service

scrape_configs:
  # The bridge is our real signal. Override to 5s so a 10 Hz stream still gets several samples per
  # minute of graph resolution; going to 1s would triple storage for little extra insight.
  - job_name: fleet-bridge
    scrape_interval: 5s
    static_configs:
      - targets: ["bridge:8000"] # docker-network DNS name of the bridge service
        labels:
          service: mqtt-prometheus-bridge

  # Anomaly detector: per-channel scores, same 5s cadence so they line up with the telemetry.
  - job_name: fleet-anomaly
    scrape_interval: 5s
    static_configs:
      - targets: ["anomaly:8001"]   # docker-network DNS name of the anomaly service
        labels:
          service: anomaly-detector

  # Incident store: fleet_incident_* metrics. Human-speed, so the 15s global interval is plenty.
  - job_name: fleet-incidents
    static_configs:
      - targets: ["incidents:9096"]   # docker-network DNS name of the incident store
        labels:
          service: incident-store

  # Prometheus scraping itself — free `up`/TSDB health, and a sanity target while wiring the stack.
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
