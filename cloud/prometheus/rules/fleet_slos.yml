# SLIs as recording rules + SLOs as alert thresholds. Recording rules precompute each SLI into a
# `fleet:...` series; alert rules encode the targets and carry severity/team/sli/runbook_url labels so
# routing is config, not code. Alerts fire on symptoms (SLO breach / sustained anomaly), never raw values.

groups:
  - name: fleet_sli_recording
    interval: 15s
    rules:
      # Seconds since last message. time() at eval means it climbs on its own for a dead device.
      - record: fleet:device_freshness_seconds
        expr: time() - fleet_last_message_timestamp_seconds

      # 1 = fresh within 10s, 0 = stale. Group rules evaluate in order, so later rules build on this.
      - record: fleet:device_up:bool
        expr: fleet:device_freshness_seconds < bool 10

      # Fleet availability: fraction of devices currently fresh.
      - record: fleet:availability:ratio
        expr: avg(fleet:device_up:bool)

      # Malformed frames as a fraction of all frames. Packet loss (seq gaps) is excluded — QoS 0 trades
      # completeness for liveness. `or vector(0)` keeps zero-error traffic reading as 0 (a labeled
      # counter has no series until its first increment, which would otherwise poison the ratio).
      - record: fleet:ingest_error:ratio_rate5m
        expr: |
          (sum(rate(fleet_message_errors_total[5m])) or vector(0))
          /
          (sum(rate(fleet_messages_total[5m])) + (sum(rate(fleet_message_errors_total[5m])) or vector(0)))

  - name: fleet_slo_alerts
    rules:
      # Freshness SLO: each device fresh (< 10s), paged per device so attribution is automatic. One quiet
      # device is the device team's problem, not a fleet page. keep_firing_for holds 1m past recovery so a
      # reconnect-looping device is one continuous alert, not a resolve/re-fire pair every cycle.
      - alert: FleetDeviceStale
        expr: fleet:device_freshness_seconds > 10
        for: 30s
        keep_firing_for: 1m
        labels:
          severity: warning
          sli: freshness
          team: device-reliability
        annotations:
          summary: "Device {{ $labels.device }} telemetry is stale"
          description: "No telemetry from {{ $labels.device }} for {{ $value | humanizeDuration }} (SLO: < 10s)."
          runbook_url: "docs/runbooks/device-offline.md"

      # Availability SLO: >= 95% of the fleet fresh. Tolerates a single device blip; a wider dip is
      # systemic → critical, owned by the platform team that runs the ingest path.
      - alert: FleetAvailabilityBelowSLO
        expr: fleet:availability:ratio < 0.95
        for: 1m
        labels:
          severity: critical
          sli: availability
          team: platform
        annotations:
          summary: "Fleet availability below SLO"
          description: "Only {{ $value | humanizePercentage }} of devices are fresh (SLO: >= 95%)."
          runbook_url: "docs/runbooks/fleet-availability.md"

      # Error-rate SLO: < 0.1% malformed frames over 5m. Machine-generated NDJSON should essentially
      # always parse, so anything higher points at framing corruption (UART/serial), not normal load.
      - alert: FleetHighErrorRate
        expr: fleet:ingest_error:ratio_rate5m > 0.001
        for: 2m
        labels:
          severity: warning
          sli: error_rate
          team: platform
        annotations:
          summary: "Ingest error rate above SLO"
          description: "Malformed-frame ratio is {{ $value | humanizePercentage }} over 5m (SLO: < 0.1%)."
          runbook_url: "docs/runbooks/ingest-errors.md"

      # Operational alert, not an SLO: an unscrapeable bridge blinds every SLI above.
      - alert: FleetIngestPipelineDown
        expr: up{job="fleet-bridge"} == 0
        for: 1m
        labels:
          severity: critical
          sli: pipeline
          team: platform
        annotations:
          summary: "MQTT to Prometheus bridge is down"
          description: "Prometheus cannot scrape the bridge; freshness / availability / error SLIs are all blind."
          runbook_url: "docs/runbooks/ingest-pipeline-down.md"

  - name: fleet_remediation_alerts
    rules:
      # Self-healing gave up: it tried its capped attempts and the target is still bad. This is the only
      # remediation event that *should* page — the loop absorbs the transient faults, a human owns the
      # ones it can't. for: 1m so a target mid-recovery doesn't flap this.
      - alert: FleetRemediationExhausted
        expr: fleet_remediation_exhausted > 0
        for: 1m
        labels:
          severity: critical
          sli: remediation
          team: platform
        annotations:
          summary: "Automated remediation exhausted for {{ $labels.target }}"
          description: "Self-healing capped its attempts on {{ $labels.target }} ({{ $labels.reason }}) and it's still unhealthy — needs a human."
          runbook_url: "docs/runbooks/remediation-exhausted.md"

  - name: fleet_anomaly_alerts
    rules:
      # Chosen z-score/MAD detector only (0.000 FP rate; see docs/detector-evaluation.md); IF stays
      # dashboard-only. Two complementary arms, one alert (dedup stays per device/channel). Duty arm:
      # anomalous for the majority of a minute. Magnitude arm: average score itself well past the trip
      # line — catches decisive-but-intermittent spikes that never hold the majority the duty arm needs.
      # keep_firing_for 2m clears slowly too, fusing an intermittent fault into one continuous alert.
      - alert: FleetChannelAnomaly
        expr: |
          avg_over_time(fleet_anomaly_flag{detector="zscore"}[1m]) > 0.5
          or
          avg_over_time(fleet_anomaly_score{detector="zscore"}[1m]) > 1.5
        for: 30s
        keep_firing_for: 2m
        labels:
          severity: warning
          sli: anomaly
          team: device-reliability
        annotations:
          summary: "Anomaly on {{ $labels.device }} / {{ $labels.channel }}"
          description: "{{ $labels.channel }} on {{ $labels.device }} has been anomalous (z-score/MAD, sustained over 1m). Confirm it's a fault, not a legitimate regime change (see runbook)."
          runbook_url: "docs/runbooks/channel-anomaly.md"

      # Severity fast-path: a pegged extreme excursion (score > 5 ≈ 17 robust-sigma) shouldn't wait out
      # the 1m dwell. min_over_time[10s] requires every sample to stay extreme, so one glitch read breaks
      # the min and can't trip it; pages critical in ~15s. keep_firing_for rides out brief dips. The
      # critical inhibits this channel's warning in Alertmanager, so one extreme fault pages once.
      - alert: FleetChannelAnomalyCritical
        expr: min_over_time(fleet_anomaly_score{detector="zscore"}[10s]) > 5
        for: 5s
        keep_firing_for: 1m
        labels:
          severity: critical
          sli: anomaly
          team: device-reliability
        annotations:
          summary: "Extreme anomaly on {{ $labels.device }} / {{ $labels.channel }}"
          description: "{{ $labels.channel }} on {{ $labels.device }} is pegged at an extreme excursion (z-score/MAD score {{ $value | printf \"%.1f\" }}, past the ~17-sigma fast-path). Likely a hard fault — paged without waiting out the dwell."
          runbook_url: "docs/runbooks/channel-anomaly.md"
